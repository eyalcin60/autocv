openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile and professional data
  - name: documents
    description: Uploaded CV documents and source materials
  - name: applications
    description: Job applications
  - name: generated
    description: AI-generated CVs and cover letters
  - name: dashboard
    description: Dashboard stats and summaries
  - name: openai
    description: OpenAI AI chat, image, and audio operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Profile
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
    put:
      operationId: upsertProfile
      tags: [profile]
      summary: Create or update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  # Documents (uploaded CVs / source materials)
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all uploaded documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Upload / add a new document (CV, publication, project description)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdate"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # Job Applications
  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List all job applications
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Create a new job application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Created application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get application with generated documents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application with generated docs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationWithDocs"
        "404":
          description: Not found
    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Update application status or details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdate"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          description: Not found
    delete:
      operationId: deleteApplication
      tags: [applications]
      summary: Delete an application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # AI generation endpoints
  /applications/{id}/generate-cv:
    post:
      operationId: generateCv
      tags: [generated]
      summary: Generate an ATS-optimized CV for the application (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCvInput"
      responses:
        "200":
          description: SSE stream of generated CV content
          content:
            text/event-stream: {}

  /applications/{id}/generate-cover-letter:
    post:
      operationId: generateCoverLetter
      tags: [generated]
      summary: Generate a tailored cover letter for the application (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of generated cover letter content
          content:
            text/event-stream: {}

  # Generated documents CRUD
  /generated-docs:
    get:
      operationId: listGeneratedDocs
      tags: [generated]
      summary: List all generated CVs and cover letters
      responses:
        "200":
          description: List of generated docs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeneratedDoc"

  /generated-docs/{id}:
    get:
      operationId: getGeneratedDoc
      tags: [generated]
      summary: Get a generated document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedDoc"
        "404":
          description: Not found
    patch:
      operationId: updateGeneratedDoc
      tags: [generated]
      summary: Edit / refine a generated document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratedDocUpdate"
      responses:
        "200":
          description: Updated generated doc
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedDoc"
        "404":
          description: Not found
    delete:
      operationId: deleteGeneratedDoc
      tags: [generated]
      summary: Delete a generated document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Dashboard / summary
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-applications:
    get:
      operationId: getRecentApplications
      tags: [dashboard]
      summary: Get 5 most recent applications
      responses:
        "200":
          description: Recent applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

  # OpenAI conversations (for AI chat / refinement)
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Profile:
      type: object
      required: [id, fullName, email, createdAt, updatedAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        linkedinUrl:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        websiteUrl:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        skills:
          type: ["string", "null"]
          description: JSON array of skill strings
        languages:
          type: ["string", "null"]
          description: JSON array of language strings
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProfileInput:
      type: object
      required: [fullName, email]
      properties:
        fullName:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        location:
          type: string
        linkedinUrl:
          type: string
        githubUrl:
          type: string
        websiteUrl:
          type: string
        summary:
          type: string
        skills:
          type: string
        languages:
          type: string

    Document:
      type: object
      required: [id, title, type, content, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [cv, publication, project, other]
        content:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DocumentInput:
      type: object
      required: [title, type, content]
      properties:
        title:
          type: string
          minLength: 1
        type:
          type: string
          enum: [cv, publication, project, other]
        content:
          type: string
        description:
          type: string

    DocumentUpdate:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [cv, publication, project, other]
        content:
          type: string
        description:
          type: string

    Application:
      type: object
      required: [id, jobTitle, company, jobDescription, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        jobTitle:
          type: string
        company:
          type: string
        jobDescription:
          type: string
        jobUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, applied, interview, offer, rejected, withdrawn]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ApplicationInput:
      type: object
      required: [jobTitle, company, jobDescription]
      properties:
        jobTitle:
          type: string
          minLength: 1
        company:
          type: string
          minLength: 1
        jobDescription:
          type: string
          minLength: 1
        jobUrl:
          type: string
        notes:
          type: string

    ApplicationUpdate:
      type: object
      properties:
        jobTitle:
          type: string
        company:
          type: string
        jobDescription:
          type: string
        jobUrl:
          type: string
        status:
          type: string
          enum: [draft, applied, interview, offer, rejected, withdrawn]
        notes:
          type: string

    ApplicationWithDocs:
      type: object
      required: [id, jobTitle, company, jobDescription, status, createdAt, updatedAt, generatedDocs]
      properties:
        id:
          type: integer
        jobTitle:
          type: string
        company:
          type: string
        jobDescription:
          type: string
        jobUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, applied, interview, offer, rejected, withdrawn]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        generatedDocs:
          type: array
          items:
            $ref: "#/components/schemas/GeneratedDoc"

    GeneratedDoc:
      type: object
      required: [id, applicationId, type, content, version, createdAt, updatedAt]
      properties:
        id:
          type: integer
        applicationId:
          type: integer
        type:
          type: string
          enum: [cv, cover_letter]
        cvSubtype:
          type: ["string", "null"]
          enum: [academic, industry, null]
          description: Only set when type is cv
        content:
          type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GeneratedDocUpdate:
      type: object
      properties:
        content:
          type: string

    GenerateCvInput:
      type: object
      required: [cvType]
      properties:
        cvType:
          type: string
          enum: [academic, industry]

    DashboardStats:
      type: object
      required: [totalApplications, totalDocuments, applicationsByStatus, recentActivityCount]
      properties:
        totalApplications:
          type: integer
        totalDocuments:
          type: integer
        recentActivityCount:
          type: integer
        applicationsByStatus:
          type: object
          properties:
            draft:
              type: integer
            applied:
              type: integer
            interview:
              type: integer
            offer:
              type: integer
            rejected:
              type: integer
            withdrawn:
              type: integer
          required: [draft, applied, interview, offer, rejected, withdrawn]

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    OpenaiConversation:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time

    OpenaiConversationInput:
      type: object
      required: [title]
      properties:
        title:
          type: string

    OpenaiMessage:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    OpenaiMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    OpenaiConversationWithMessages:
      type: object
      required: [id, title, createdAt, messages]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
